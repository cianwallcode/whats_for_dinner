<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's for Dinner</title>
    <style>
        :root {
            --orange: #FF8C00;
            --white: #FFFFFF;
            --charcoal: #222222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { background-color: var(--white); color: var(--charcoal); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { padding: 2rem; position: absolute; top: 0; left: 0; width: 100%; z-index: 10; }
        .logo { font-weight: 900; font-size: 1.5rem; letter-spacing: -1px; text-transform: uppercase; cursor: pointer; text-decoration: none; color: var(--charcoal); }

        #app-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .step { display: none; opacity: 0; transition: opacity 0.6s ease-in-out; text-align: center; width: 100%; max-width: 500px; }
        .step.active { display: block; opacity: 1; }

        h1 { font-size: 2.5rem; text-transform: uppercase; margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .card { border: 2px solid var(--charcoal); padding: 2rem; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .card:hover { border-color: var(--orange); background: var(--orange); color: var(--white); }

        #recipe-display { text-align: left; background: #f9f9f9; padding: 2rem; border: 1px solid #eee; }
        .nutrient-bar { height: 8px; background: #ddd; margin: 10px 0; }
        .nutrient-fill { height: 100%; background: var(--orange); width: 80%; }

        footer { padding: 1rem; text-align: center; font-size: 0.6rem; color: #aaa; border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <header>
        <a href="javascript:location.reload()" class="logo">What's for Dinner</a>
    </header>

    <main id="app-container">
        <div id="step-1" class="step active">
            <h1>Select Protein</h1>
            <div class="grid">
                <div class="card" onclick="saveChoice('protein', 'Salmon', 'step-2')">Salmon</div>
                <div class="card" onclick="saveChoice('protein', 'Beef', 'step-2')">Beef</div>
            </div>
        </div>

        <div id="step-2" class="step">
            <h1>Select Carb</h1>
            <div class="grid">
                <div class="card" onclick="saveChoice('carb', 'Quinoa', 'step-3')">Quinoa</div>
                <div class="card" onclick="saveChoice('carb', 'Sweet Potato', 'step-3')">Sweet Potato</div>
            </div>
        </div>

        <div id="step-3" class="step">
            <h1>Select Store</h1>
            <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
                <div class="card" onclick="saveChoice('store', 'Lidl', 'step-4')">Lidl</div>
                <div class="card" onclick="saveChoice('store', 'Dunnes', 'step-4')">Dunnes</div>
                <div class="card" onclick="saveChoice('store', 'Aldi', 'step-4')">Aldi</div>
            </div>
        </div>

        <div id="step-4" class="step">
            <h1>Dinner Ready</h1>
            <div id="recipe-display">
                <h3 id="recipe-title"></h3>
                <p id="recipe-desc" style="margin: 1rem 0;"></p>
                <div class="nutrient-bar"><div class="nutrient-fill"></div></div>
                <small>Optimized for 70kg Maintenance</small>
            </div>
            <button onclick="location.reload()" style="margin-top:20px; padding: 1rem 2rem; background: var(--charcoal); color: white; border: none; font-weight: bold; cursor: pointer; width: 100%;">RESTART</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 What's for Dinner. All Rights Reserved.</p>
    </footer>

    <script>
        const state = { protein: '', carb: '', store: '' };

        function saveChoice(key, value, nextId) {
            state[key] = value;
            if(nextId === 'step-4') {
                renderResult();
            }
            nextStep(nextId);
        }

        function nextStep(nextId) {
            const current = document.querySelector('.step.active');
            current.classList.remove('active');
            setTimeout(() => {
                current.style.display = 'none';
                const next = document.getElementById(nextId);
                next.style.display = 'block';
                setTimeout(() => next.classList.add('active'), 50);
            }, 600);
        }

        function renderResult() {
            const recipes = {
                "Salmon|Quinoa": "Lemon-Herb Crusted Salmon served over a fluffy Quinoa bed with sautéed spinach. Rich in Omega-3s.",
                "Salmon|Sweet Potato": "Oven-baked Salmon Fillet paired with roasted Sweet Potato wedges and steamed broccoli.",
                "Beef|Quinoa": "Pan-seared Beef strips with a Quinoa stir-fry, peppers, and onions. High iron and B12 content.",
                "Beef|Sweet Potato": "Grilled Lean Steak with garlic-infused Sweet Potato mash and kale. Optimized for post-workout recovery."
            };

            const key = `${state.protein}|${state.carb}`;
            document.getElementById('recipe-title').innerText = `${state.protein} & ${state.carb} at ${state.store}`;
            document.getElementById('recipe-desc').innerText = recipes[key] || "Custom fusion meal created for your nutritional needs.";
        }
    </script>
</body>
</html>
